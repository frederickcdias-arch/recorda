services:
  postgres:
    image: postgres:15-alpine
    container_name: recorda-postgres
    environment:
      POSTGRES_USER: recorda
      POSTGRES_PASSWORD: recorda
      POSTGRES_DB: recorda
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U recorda -d recorda']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
