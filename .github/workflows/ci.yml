name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@recorda/shared

      - name: Typecheck backend
        run: npm run typecheck --workspace=@recorda/backend

      - name: Typecheck frontend
        run: npm run typecheck --workspace=@recorda/frontend

      - name: Lint
        run: npm run lint
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck-and-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build all packages
        run: npm run build

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: typecheck-and-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@recorda/shared

      - name: Run backend unit tests
        run: npm run test --workspace=@recorda/backend
        continue-on-error: true

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: typecheck-and-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@recorda/shared

      - name: Run frontend unit tests
        run: npm run test --workspace=@recorda/frontend
        continue-on-error: true
